    function ShipperResearchPanel({ commodity }) {
      const [status, setStatus] = React.useState("idle");
      const [results, setResults] = React.useState([]);
      const [errorMsg, setErrorMsg] = React.useState("");

      const research = async () => {
        setStatus("loading");
        setResults([]);
        setErrorMsg("");

        const peakMonthNames = commodity.peakMonths.map(i => MONTHS[i]).join(", ");
        const originsStr = commodity.origins.join(", ");

        const prompt = `You are a freight broker research assistant specializing in produce shipping lanes.

Find 5-7 ADDITIONAL grower-shippers, packing houses, or grower cooperatives for this commodity. These are shippers NOT on this existing list: ${commodity.shippers.map(s => s.name).join(", ")}.

Commodity: ${commodity.name}
Growing regions: ${originsStr}
Peak months: ${peakMonthNames}
Temperature: ${commodity.temp}
Equipment: ${commodity.equipment}

STRICT RULES:
- Return ONLY actual growers, packing sheds, or grower-shipper cooperatives that own or operate farms
- Do NOT include retail brands, food manufacturers, distributors, or brokers
- Focus on operations physically located near: ${originsStr}
- Each entry: company name, city/state, and a 1-2 sentence broker-relevant note (FTL volume, peak window, who to ask for, what to mention)
- These must be real operating businesses

Respond ONLY with a valid JSON array — no markdown, no explanation, no code fences:
[{"name":"...","location":"City, ST","note":"..."}]`;

        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              tools: [{ type: "web_search_20250305", name: "web_search" }],
              messages: [{ role: "user", content: prompt }]
            })
          });

          if (!response.ok) throw new Error(`API error ${response.status}`);
          const data = await response.json();

          const textBlocks = (data.content || []).filter(b => b.type === "text");
          if (!textBlocks.length) throw new Error("No response text");

          const raw = textBlocks[textBlocks.length - 1].text;
          const clean = raw.replace(/```json\n?/g, "").replace(/```\n?/g, "").trim();
          const start = clean.indexOf("[");
          const end = clean.lastIndexOf("]");
          if (start === -1 || end === -1) throw new Error("Could not parse results");

          const parsed = JSON.parse(clean.slice(start, end + 1));
          if (!Array.isArray(parsed) || parsed.length === 0) throw new Error("No shippers found");
          setResults(parsed);
          setStatus("done");
        } catch (err) {
          setErrorMsg(err.message || "Research failed");
          setStatus("error");
        }
      };

      return (
        <div style={{ marginTop: 8 }}>
          {status === "idle" && (
            <button onClick={research}
              style={{ width: "100%", display: "flex", justifyContent: "center", alignItems: "center", gap: 7, background: "#040d14", border: "1px dashed #0d3060", borderRadius: 3, padding: "8px", cursor: "pointer", fontFamily: "monospace" }}>
              <span style={{ fontSize: 13 }}>🔍</span>
              <span style={{ fontSize: 11, color: "#2a6aaa", letterSpacing: "0.12em", textTransform: "uppercase" }}>Research More Shippers</span>
            </button>
          )}
          {status === "loading" && (
            <div style={{ padding: "12px 10px", background: "#040c18", border: "1px dashed #0d3060", borderRadius: 3, textAlign: "center" }}>
              <div style={{ fontSize: 10, color: "#1a4a7a", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 5 }}>Searching…</div>
              <div style={{ fontSize: 10, color: "#0e2a50", marginBottom: 8, fontStyle: "italic" }}>Finding grower-shippers near {commodity.origins[0]}</div>
              <div style={{ display: "flex", justifyContent: "center", gap: 5 }}>
                {[0,1,2,3].map(i => (
                  <div key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: "#1a4a8a", animation: `pulse 1.4s ease-in-out ${i*0.18}s infinite` }} />
                ))}
              </div>
            </div>
          )}
          {status === "error" && (
            <div style={{ padding: "8px 10px", background: "#100808", border: "1px solid #2a0a0a", borderRadius: 3 }}>
              <div style={{ fontSize: 11, color: "#aa3030", marginBottom: 5 }}>⚠ {errorMsg}</div>
              <button onClick={research} style={{ fontSize: 11, color: "#3a6aaa", background: "transparent", border: "none", cursor: "pointer", fontFamily: "monospace", textDecoration: "underline" }}>Try again</button>
            </div>
          )}
          {status === "done" && results.length > 0 && (
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 6 }}>
                <span style={{ width: 5, height: 5, borderRadius: "50%", background: "#2a8a50", display: "inline-block", flexShrink: 0 }}></span>
                <span style={{ fontSize: 10, color: "#1a5a30", letterSpacing: "0.2em", textTransform: "uppercase" }}>AI Researched · {results.length} additional shippers</span>
                <button onClick={() => { setStatus("idle"); setResults([]); }} style={{ marginLeft: "auto", fontSize: 10, color: "#1a3a20", background: "transparent", border: "none", cursor: "pointer", fontFamily: "monospace" }}>✕ clear</button>
              </div>
              {results.map((s, i) => <AiShipperCard key={i} s={s} idx={i} />)}
              <button onClick={research}
                style={{ width: "100%", marginTop: 4, fontSize: 10, color: "#1a3a20", background: "transparent", border: "1px dashed #0a2010", borderRadius: 3, padding: "5px", cursor: "pointer", fontFamily: "monospace", letterSpacing: "0.1em" }}>
                🔄 SEARCH AGAIN
              </button>
            </div>
          )}
        </div>
      );
    }

    function UpcomingTab({ selectedMonth }) {
      const fwdMonths = [1,2,3,4].map(i => (selectedMonth + i) % 12);

      const startingSoon = useMemo(() => PRODUCE.filter(p => {
        if (p.peakMonths.includes(selectedMonth)) return false;
        return fwdMonths.some(m => p.peakMonths.includes(m));
      }).map(p => {
        const monthsUntil = fwdMonths.findIndex(m => p.peakMonths.includes(m)) + 1;
        return { ...p, monthsUntil };
      }).sort((a, b) => {
        if (a.monthsUntil !== b.monthsUntil) return a.monthsUntil - b.monthsUntil;
        const order = { critical: 0, high: 1, medium: 2, flexible: 3 };
        return (order[a.urgency] || 2) - (order[b.urgency] || 2);
      }), [selectedMonth]);

      const windingDown = useMemo(() => PRODUCE.filter(p => {
        if (!p.peakMonths.includes(selectedMonth)) return false;
        return [1, 2].some(i => !p.peakMonths.includes((selectedMonth + i) % 12));

        const monthsLeft = [1,2,3].findIndex(i => !p.peakMonths.includes((selectedMonth + i) % 12));
        return { ...p, monthsLeft: monthsLeft === -1 ? 3 : monthsLeft };
      }).sort((a, b) => a.monthsLeft - b.monthsLeft), [selectedMonth]);

      const [openShippers, setOpenShippers] = useState({});

                      <UrgencyBadge level={p.urgency} />
                    </div>
                    <div style={{ fontSize: 11, color: "#3a9a5a", marginBottom: 3 }}>
                      Starts in <strong style={{ color: "#5aaa7a" }}>{monthLabel(p.monthsUntil)}</strong> · {MONTHS[(selectedMonth + p.monthsUntil) % 12]}
                    </div>
                    <SeasonBar peakMonths={p.peakMonths} selectedMonth={selectedMonth} compact />
                    <div style={{ marginTop: 6 }}>
                      <div style={{ fontSize: 10, color: "#1e3a60", marginBottom: 3, letterSpacing: "0.1em", textTransform: "uppercase" }}>Call first:</div>
                      {p.shippers?.slice(0, 2).map(s => (
                        <div key={s.name} style={{ fontSize: 11, color: "#4a7acc", marginBottom: 2 }}>
                          📞 <strong>{s.name}</strong> · {s.location}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {windingDown.length > 0 && (
            <div style={{ padding: "10px 12px 4px", borderTop: startingSoon.length > 0 ? "1px solid #0f1828" : "none" }}>
              <div style={{ fontSize: 11, color: "#9a6a2a", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                <span>⏳</span> Winding down · {windingDown.length} commodities
              </div>
              {windingDown.map(p => (
                <div key={p.name} style={{ marginBottom: 6, background: "#080c18", border: "1px solid #2a1a00", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ padding: "8px 10px", borderLeft: "3px solid #8a5020" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 6, marginBottom: 3 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 14 }}>{p.emoji}</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#c09060" }}>{p.name}</span>
                      </div>
                      <span style={{ fontSize: 10, color: "#8a5020", fontFamily: "monospace", background: "#1a0e00", border: "1px solid #3a2000", padding: "2px 6px", borderRadius: 3 }}>
                        ~{monthLabel(p.monthsLeft)} left
                      </span>
                    </div>
                    <div style={{ fontSize: 11, color: "#7a5020" }}>Book remaining capacity now before season closes</div>
                    <SeasonBar peakMonths={p.peakMonths} selectedMonth={selectedMonth} compact />
                  </div>
                </div>
              ))}
            </div>
          )}

          {startingSoon.length === 0 && windingDown.length === 0 && (
            <div style={{ padding: "30px 20px", textAlign: "center", color: "#182e58", fontSize: 13, lineHeight: 1.8 }}>
              No major seasonal transitions<br/>in the next 4 months.
            </div>
          )}
        </div>
      );
    }

    function ProduceHeatMap() {
      const [selectedMonth, setSelectedMonth] = useState(currentMonth);
      const [statePaths, setStatePaths] = useState(null);
      const [loading, setLoading] = useState(true);
      const [hoveredOrigin, setHoveredOrigin] = useState(null);
      const [selectedProduce, setSelectedProduce] = useState(null);
      const [tooltip, setTooltip] = useState(null);
      const [filterCategory, setFilterCategory] = useState("All");
      const [sidebarSearch, setSidebarSearch] = useState("");
      const [sidebarTab, setSidebarTab] = useState("commodities");
      const [odOrigin, setOdOrigin] = useState(null);
      const [odDest, setOdDest] = useState(null);
      const [odMode, setOdMode] = useState("origin"); // "origin" | "truck"
      const [truckLocation, setTruckLocation] = useState(null);
      const [showShippers, setShowShippers] = useState({});
      const containerRef = useRef(null);
      const svgRef = useRef(null);
      const [zoomTransform, setZoomTransform] = useState({ k: 1, x: 0, y: 0 });
      const zoomBehaviorRef = useRef(null);
      const [dims, setDims] = useState({ w: 960, h: 600 });

      useEffect(() => {
        const update = () => {
          if (containerRef.current) {
            const w = Math.max(containerRef.current.offsetWidth, 400);
            setDims({ w, h: Math.round(w * 0.625) });
          }
        };
        update();
        window.addEventListener("resize", update);
        return () => window.removeEventListener("resize", update);
      }, []);

      useEffect(() => {
        const load = async () => {
          const resp = await fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json");
          const topo = await resp.json();
          const features = topojson.feature(topo, topo.objects.states).features;
          const mesh = topojson.mesh(topo, topo.objects.states, (a, b) => a !== b);
          setStatePaths({ features, mesh });
          setLoading(false);
        };
        load().catch(() => setLoading(false));
      }, []);

      useEffect(() => {
        if (loading || !svgRef.current) return;
        const zoom = d3.zoom().scaleExtent([1, 12]).on("zoom", (e) => {
          setZoomTransform({ k: e.transform.k, x: e.transform.x, y: e.transform.y });
        });
        zoomBehaviorRef.current = zoom;
        d3.select(svgRef.current).call(zoom);
        return () => d3.select(svgRef.current).on(".zoom", null);
      }, [loading]);

      const proj = useMemo(() => d3.geoAlbersUsa().scale(dims.w * 1.28).translate([dims.w / 2, dims.h / 2]), [dims]);
      const pathGen = useMemo(() => d3.geoPath().projection(proj), [proj]);
      const projectPoint = (coords) => proj(coords);

      const handleZoomIn = () => { if (svgRef.current && zoomBehaviorRef.current) d3.select(svgRef.current).transition().duration(300).call(zoomBehaviorRef.current.scaleBy, 1.6); };
      const handleZoomOut = () => { if (svgRef.current && zoomBehaviorRef.current) d3.select(svgRef.current).transition().duration(300).call(zoomBehaviorRef.current.scaleBy, 0.625); };
      const handleZoomReset = () => { if (svgRef.current && zoomBehaviorRef.current) d3.select(svgRef.current).transition().duration(400).call(zoomBehaviorRef.current.transform, d3.zoomIdentity); };

      const toggleShippers = (name) => setShowShippers(prev => ({ ...prev, [name]: !prev[name] }));

      const activeProduce = useMemo(() => PRODUCE.filter(p => {
        const monthMatch = p.peakMonths.includes(selectedMonth);
        const catMatch = filterCategory === "All" || p.category === filterCategory;
        const searchMatch = sidebarSearch === "" || p.name.toLowerCase().includes(sidebarSearch.toLowerCase());
        return monthMatch && catMatch && searchMatch;
      }), [selectedMonth, filterCategory, sidebarSearch]);

      const originActivity = useMemo(() => {
        const map = {};
        activeProduce.forEach(p => p.origins.forEach(o => {
          if (!ORIGIN_COORDS[o]) return;
          if (!map[o]) map[o] = { name: o, count: 0, commodities: [] };
          map[o].count++; map[o].commodities.push(p.name);
        }));
        return Object.values(map);
      }, [activeProduce]);

      const selectedData = selectedProduce ? PRODUCE.find(p => p.name === selectedProduce) : null;

      // O/D origin-first
      const odOriginList = useMemo(() => {
        const set = new Set();
        activeProduce.forEach(p => p.origins.forEach(o => { if (ORIGIN_COORDS[o]) set.add(o); }));
        return [...set].sort();
      }, [activeProduce]);
      const odDestList = useMemo(() => {
        if (!odOrigin) return [];
        const set = new Set();
        activeProduce.forEach(p => { if (p.origins.includes(odOrigin)) p.destinations.forEach(d => { if (DEST_COORDS[d]) set.add(d); }); });
        return [...set].sort();
      }, [odOrigin, activeProduce]);
      const odLaneCommodities = useMemo(() => {
        if (!odOrigin) return [];
        return activeProduce.filter(p => p.origins.includes(odOrigin) && (odDest ? p.destinations.includes(odDest) : true));
      }, [odOrigin, odDest, activeProduce]);
      const odMapDests = odDest ? [odDest] : (odOrigin ? odDestList : []);

      // O/D truck-first (destination-first)
      const allDestList = useMemo(() => Object.keys(DEST_COORDS).sort(), []);
      const truckOriginList = useMemo(() => {
        if (!truckLocation) return [];
        const set = new Set();
        activeProduce.forEach(p => {
          if (p.destinations.includes(truckLocation)) {
            p.origins.forEach(o => { if (ORIGIN_COORDS[o]) set.add(o); });
          }
        });
        return [...set].sort();
      }, [truckLocation, activeProduce]);
      const truckLaneCommodities = useMemo(() => {
        if (!truckLocation) return [];
        return activeProduce.filter(p => p.destinations.includes(truckLocation));
      }, [truckLocation, activeProduce]);
      // Group truck commodities by origin
      const truckByOrigin = useMemo(() => {
        if (!truckLocation) return [];
        const map = {};
        truckLaneCommodities.forEach(p => {
          p.origins.forEach(o => {
            if (!ORIGIN_COORDS[o]) return;
            if (!map[o]) map[o] = { origin: o, commodities: [] };
            if (p.destinations.includes(truckLocation)) map[o].commodities.push(p);
          });
        });
        return Object.values(map).sort((a, b) => b.commodities.length - a.commodities.length);
      }, [truckLocation, truckLaneCommodities]);

      const heatColor = (count) => count >= 7 ? "#ffffff" : count >= 5 ? "#88ddff" : count >= 3 ? "#00aaff" : count >= 2 ? "#0088ff" : "#0055ff";
      const heatRadius = (count) => count >= 7 ? 64 : count >= 5 ? 52 : count >= 3 ? 40 : count >= 2 ? 30 : 20;

      // Map highlight logic for truck mode
      const mapHighlightOrigins = sidebarTab === "od" && odMode === "truck" && truckLocation
        ? truckOriginList
        : sidebarTab === "od" && odOrigin ? [odOrigin]
        : sidebarTab === "commodities" && selectedData ? selectedData.origins
        : [];

      const mapShowDests = sidebarTab === "od" && odMode === "truck" && truckLocation
        ? [truckLocation]
        : sidebarTab === "od" && odMode === "origin"
        ? odMapDests
        : sidebarTab === "commodities" && selectedData
        ? selectedData.destinations
        : [];

      const mapLanes = sidebarTab === "od" && odMode === "truck" && truckLocation
        ? truckOriginList.map(o => ({ o, dests: [truckLocation] }))
        : sidebarTab === "od" && odMode === "origin" && odOrigin
        ? [{ o: odOrigin, dests: odMapDests }]
        : sidebarTab === "commodities" && selectedData
        ? selectedData.origins.map(o => ({ o, dests: selectedData.destinations }))
        : [];

      return (
        <div style={{ fontFamily: "'Courier New', monospace", background: "#06090f", minHeight: "100vh", color: "#b0c8ee", display: "flex", flexDirection: "column" }}>
          {/* Header */}
          <div style={{ padding: "14px 20px 10px", borderBottom: "1px solid #0f1828", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: "0.3em", color: "#2a4a7a", textTransform: "uppercase", marginBottom: 2 }}>Resolve Logistics · Internal Tool</div>
              <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, letterSpacing: "0.06em", color: "#d0e4f8" }}>US Produce Shipping Heat Map</h1>
            </div>
            <div style={{ display: "flex", gap: 14, fontSize: 13, color: "#3a5a9a", flexWrap: "wrap", alignItems: "center" }}>
              {Object.entries(URGENCY_CONFIG).map(([k, v]) => (
                <span key={k} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ width: 7, height: 7, borderRadius: "50%", background: v.color, display: "inline-block" }}></span>
                  <span style={{ color: v.color, fontSize: 11 }}>{v.label}</span>
                </span>
              ))}
            </div>
          </div>

          {/* Month bar */}
          <div style={{ padding: "10px 20px", borderBottom: "1px solid #0f1828", display: "flex", gap: 4, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 11, color: "#2a4a7a", letterSpacing: "0.2em", marginRight: 6, textTransform: "uppercase" }}>Month:</span>
            {MONTHS.map((m, i) => {
              const isSelected = i === selectedMonth;
              const isCurrent = i === currentMonth;
              return (
                <button key={m} onClick={() => { setSelectedMonth(i); setSelectedProduce(null); }}
                  style={{ padding: "5px 10px", borderRadius: 3, background: isSelected ? "#1e3a70" : "#080c18", color: isSelected ? "#d0e4f8" : "#3a5a9a", border: isSelected ? "1px solid #4a7acc" : isCurrent ? "1px solid #1e3a70" : "1px solid #0f1828", fontSize: 13, cursor: "pointer", fontFamily: "monospace", fontWeight: isSelected ? 700 : 400, letterSpacing: "0.04em" }}>
                  {m}{isCurrent && <span style={{ color: "#00aaff", marginLeft: 2, fontSize: 8 }}>●</span>}
                </button>
              );
            })}
            <span style={{ marginLeft: "auto", fontSize: 13, color: "#2a4a7a" }}>{activeProduce.length} commodities active</span>
          </div>

          {/* Category filter */}
          <div style={{ padding: "8px 20px", borderBottom: "1px solid #0f1828", display: "flex", gap: 4, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 11, color: "#2a4a7a", letterSpacing: "0.2em", marginRight: 6, textTransform: "uppercase" }}>Filter:</span>
            {["All", ...CATEGORIES].map(cat => (
              <button key={cat} onClick={() => setFilterCategory(cat)}
                style={{ padding: "3px 10px", borderRadius: 3, background: filterCategory === cat ? "#0e2650" : "transparent", color: filterCategory === cat ? "#7ab0e8" : "#2a4a7a", border: filterCategory === cat ? "1px solid #1a5aaa" : "1px solid #0f1828", fontSize: 13, cursor: "pointer", fontFamily: "monospace" }}>{cat}</button>
            ))}
          </div>

          <div style={{ display: "flex", flex: 1 }}>
            {/* Map */}
            <div ref={containerRef} style={{ flex: 1, position: "relative", overflow: "hidden" }}>
              {loading ? (
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 500, color: "#2a4a7a", fontSize: 13, letterSpacing: "0.25em" }}>LOADING MAP…</div>
              ) : (
                <svg ref={svgRef} width="100%" viewBox={`0 0 ${dims.w} ${dims.h}`} style={{ display: "block", cursor: zoomTransform.k > 1 ? "grab" : "default" }}>
                  <defs>
                    <filter id="heatGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="16" /></filter>
                    <filter id="dotGlow" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="3" result="blur" /><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <filter id="destGlow" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="2.5" result="blur" /><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <filter id="lineGlow"><feGaussianBlur stdDeviation="1.5" result="blur" /><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                  </defs>
                  <rect width={dims.w} height={dims.h} fill="#06090f" />
                  <g transform={`translate(${zoomTransform.x},${zoomTransform.y}) scale(${zoomTransform.k})`}>
                    {statePaths?.features?.map(f => <path key={f.id} d={pathGen(f)} fill="#0a0e1a" stroke="none" />)}
                    {statePaths?.mesh && <path d={pathGen(statePaths.mesh)} fill="none" stroke="#142038" strokeWidth={0.6} />}
                    {originActivity.map(o => {
                      const coords = ORIGIN_COORDS[o.name]; if (!coords) return null;
                      const pt = projectPoint(coords); if (!pt) return null;
                      const isHighlighted = mapHighlightOrigins.includes(o.name);
                      const isDimmed = mapHighlightOrigins.length > 0 && !isHighlighted;
                      return <circle key={`heat-${o.name}`} cx={pt[0]} cy={pt[1]} r={heatRadius(o.count)} fill={isHighlighted ? "#00eeff" : heatColor(o.count)} opacity={isDimmed ? 0.05 : isHighlighted ? 0.6 : 0.28} filter="url(#heatGlow)" style={{ pointerEvents: "none" }} />;
                    })}
                    {mapLanes.map(({ o, dests }) => {
                      const oCoords = ORIGIN_COORDS[o]; if (!oCoords) return null;
                      const oPt = projectPoint(oCoords); if (!oPt) return null;
                      return dests.map(d => {
                        const dCoords = DEST_COORDS[d]; if (!dCoords) return null;
                        const dPt = projectPoint(dCoords); if (!dPt) return null;
                        const isSelectedLane = (odDest === d || truckLocation === d) && (odOrigin === o || mapHighlightOrigins.includes(o));
                        const mx = (oPt[0]+dPt[0])/2, my = Math.min(oPt[1],dPt[1])-50;
                        return <path key={`lane-${o}-${d}`} d={`M ${oPt[0]} ${oPt[1]} Q ${mx} ${my} ${dPt[0]} ${dPt[1]}`} fill="none" stroke={isSelectedLane ? "#00ddff" : "#3388ff"} strokeWidth={isSelectedLane ? 1.4 : 0.8} opacity={isSelectedLane ? 0.6 : 0.28} filter="url(#lineGlow)" style={{ pointerEvents: "none" }} />;
                      });
                    })}
                    {mapShowDests.map(d => {
                      const coords = DEST_COORDS[d]; if (!coords) return null;
                      const pt = projectPoint(coords); if (!pt) return null;
                      const isTruck = d === truckLocation;
                      return <g key={`dest-${d}`}>
                        <circle cx={pt[0]} cy={pt[1]} r={isTruck ? 14 : 10} fill={isTruck ? "#ffaa00" : "#00d4ff"} opacity={0.12} style={{ pointerEvents: "none" }} />
                        <circle cx={pt[0]} cy={pt[1]} r={isTruck ? 6 : 4} fill={isTruck ? "#ffaa00" : "#00d4ff"} filter="url(#destGlow)" style={{ pointerEvents: "none" }} />
                        <text x={pt[0]} y={pt[1]-10} textAnchor="middle" fontSize={9} fill={isTruck ? "#ffaa00" : "#00d4ff"} opacity={0.7} style={{ pointerEvents: "none", fontFamily: "monospace" }}>{d.split(",")[0]}</text>
                      </g>;
                    })}
                    {originActivity.map(o => {
                      const coords = ORIGIN_COORDS[o.name]; if (!coords) return null;
                      const pt = projectPoint(coords); if (!pt) return null;
                      const isHovered = hoveredOrigin === o.name;
                      const isHighlighted = mapHighlightOrigins.includes(o.name);
                      const isDimmed = mapHighlightOrigins.length > 0 && !isHighlighted;
                      return (
                        <g key={`dot-${o.name}`}
                          onMouseEnter={(e) => { setHoveredOrigin(o.name); setTooltip({ x: e.clientX, y: e.clientY, data: o }); }}
                          onMouseLeave={() => { setHoveredOrigin(null); setTooltip(null); }}
                          onClick={() => { setSidebarTab("od"); setOdMode("origin"); setOdOrigin(odOrigin === o.name ? null : o.name); setOdDest(null); setSelectedProduce(null); }}
                          style={{ cursor: "pointer" }}>
                          {isHovered && <circle cx={pt[0]} cy={pt[1]} r={16} fill={heatColor(o.count)} opacity={0.18} />}
                          <circle cx={pt[0]} cy={pt[1]} r={isHovered || isHighlighted ? 6 : 4} fill={isHighlighted ? "#00eeff" : isDimmed ? "#101828" : heatColor(o.count)} filter="url(#dotGlow)" opacity={isDimmed ? 0.25 : 1} stroke={isHovered || isHighlighted ? "#fff" : "none"} strokeWidth={1} />
                          {o.count >= 3 && !isDimmed && (
                            <text x={pt[0]} y={pt[1]-9} textAnchor="middle" fontSize={8} fill={heatColor(o.count)} opacity={0.65} style={{ pointerEvents: "none", fontFamily: "monospace" }}>{o.count}</text>
                          )}
                        </g>
                      );
                    })}
                  </g>
                </svg>
              )}
              {!loading && (
                <div style={{ position: "absolute", bottom: 16, left: 16, display: "flex", flexDirection: "column", gap: 4 }}>
                  {[["＋", handleZoomIn], ["－", handleZoomOut], ["⊙", handleZoomReset]].map(([label, fn]) => (
                    <button key={label} onClick={fn} style={{ width: 34, height: 34, background: "#0a1428", border: "1px solid #182840", color: "#7ab0e8", fontSize: 18, cursor: "pointer", borderRadius: 4, fontFamily: "monospace", display: "flex", alignItems: "center", justifyContent: "center" }}>{label}</button>
                  ))}
                  <div style={{ textAlign: "center", fontSize: 11, color: "#2a4a7a", marginTop: 2 }}>{Math.round(zoomTransform.k * 100)}%</div>
                </div>
              )}
              {tooltip && (
                <div style={{ position: "fixed", left: tooltip.x + 14, top: tooltip.y - 8, background: "#080c18", border: "1px solid #182e58", padding: "10px 14px", borderRadius: 4, fontSize: 13, pointerEvents: "none", zIndex: 999, maxWidth: 240, boxShadow: "0 4px 24px #000c" }}>
                  <div style={{ fontWeight: 700, color: "#d0e4f8", marginBottom: 5 }}>{tooltip.data.name}</div>
                  <div style={{ color: "#4a8acc", marginBottom: 5 }}>{tooltip.data.count} active {tooltip.data.count === 1 ? "commodity" : "commodities"}</div>
                  <div style={{ color: "#7090c0", lineHeight: 1.7, fontSize: 11 }}>{tooltip.data.commodities.join(" · ")}</div>
                </div>
              )}
            </div>

            {/* Sidebar */}
            <div style={{ width: 320, borderLeft: "1px solid #0f1828", background: "#06090f", flexShrink: 0, display: "flex", flexDirection: "column" }}>
              <div style={{ display: "flex", borderBottom: "1px solid #0f1828" }}>
                {[["commodities","🌽 Commodities"],["od","🔀 O/D Pairs"],["upcoming","📅 Upcoming"]].map(([tab, label]) => (
                  <button key={tab} onClick={() => { setSidebarTab(tab); setSelectedProduce(null); setOdOrigin(null); setOdDest(null); }}
                    style={{ flex: 1, padding: "9px 4px", background: sidebarTab === tab ? "#0a1428" : "transparent", color: sidebarTab === tab ? "#7ab0e8" : "#2a4a7a", border: "none", borderBottom: sidebarTab === tab ? "2px solid #3a6acc" : "2px solid transparent", fontSize: 12, cursor: "pointer", fontFamily: "monospace", fontWeight: sidebarTab === tab ? 700 : 400 }}>
                    {label}
                  </button>
                ))}
              </div>

              {/* COMMODITIES TAB */}
              {sidebarTab === "commodities" && (
                <>
                  <div style={{ padding: "10px 12px 6px", borderBottom: "1px solid #0f1828" }}>
                    <div style={{ fontSize: 11, letterSpacing: "0.2em", color: "#2a4a7a", textTransform: "uppercase", marginBottom: 6 }}>{MONTHS[selectedMonth]} · {activeProduce.length} Active</div>
                    <input placeholder="Search…" value={sidebarSearch} onChange={e => setSidebarSearch(e.target.value)}
                      style={{ width: "100%", padding: "5px 8px", background: "#080c18", border: "1px solid #182840", borderRadius: 3, color: "#7a9abe", fontSize: 13, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }} />
                  </div>
                  <div style={{ padding: "8px", flex: 1, overflowY: "auto" }}>
                    {activeProduce.length === 0 && <div style={{ color: "#182e58", fontSize: 13, textAlign: "center", paddingTop: 24 }}>No results</div>}
                    {activeProduce.map(p => {
                      const isSelected = selectedProduce === p.name;
                      const shipperOpen = showShippers[p.name];
                      const urgCfg = URGENCY_CONFIG[p.urgency] || URGENCY_CONFIG.medium;
                      return (
                        <div key={p.name} style={{ marginBottom: 4 }}>
                          <div onClick={() => setSelectedProduce(isSelected ? null : p.name)}
                            style={{ padding: "8px 10px", background: isSelected ? "#0d1e40" : "#0a0e1a", border: `1px solid ${isSelected ? "#2a5a9a" : "#0e1830"}`, borderRadius: isSelected ? "4px 4px 0 0" : 4, borderLeft: `3px solid ${urgCfg.color}`, cursor: "pointer" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 7, justifyContent: "space-between" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 7, minWidth: 0 }}>
                                <span style={{ fontSize: 15 }}>{p.emoji}</span>
                                <div style={{ minWidth: 0 }}>
                                  <div style={{ fontSize: 13, fontWeight: isSelected ? 700 : 500, color: isSelected ? "#90c8f0" : "#6090c8", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</div>
                                  <div style={{ fontSize: 10, color: "#1e3a70", marginTop: 1 }}>{p.category} · {p.equipment}</div>
                                </div>
                              </div>
                              <UrgencyBadge level={p.urgency} />
                            </div>
                            <SeasonBar peakMonths={p.peakMonths} selectedMonth={selectedMonth} compact />
                          </div>
                          {isSelected && (
                            <div style={{ padding: "10px 10px", background: "#0a0f20", border: "1px solid #2a5a9a", borderTop: "none", borderRadius: "0 0 4px 4px" }}>
                              <div style={{ marginBottom: 8 }}><UrgencyBadge level={p.urgency} size="lg" /></div>
                              <div style={{ fontSize: 11, color: "#1a4890", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 4 }}>Origins</div>
                              {p.origins.map(o => <div key={o} style={{ fontSize: 12, color: "#55bbff", marginBottom: 2, paddingLeft: 5, borderLeft: "2px solid #0055ff" }}>{o}</div>)}
                              <div style={{ fontSize: 11, color: "#1a4890", letterSpacing: "0.12em", textTransform: "uppercase", margin: "7px 0 4px" }}>Top Destinations</div>
                              {p.destinations.slice(0,5).map(d => <div key={d} style={{ fontSize: 12, color: "#44ccff", marginBottom: 2, paddingLeft: 5, borderLeft: "2px solid #0077aa" }}>{d}</div>)}
                              <div style={{ fontSize: 12, color: "#2a4a7a", marginTop: 7 }}>🌡️ {p.temp}</div>
                              <CarrierReqsPanel reqs={p.carrierReqs} />
                              <div style={{ fontSize: 12, color: "#3a6a9a", marginTop: 6, lineHeight: 1.55, fontStyle: "italic" }}>{p.notes}</div>
                              <div style={{ marginTop: 10, borderTop: "1px solid #0d1e38", paddingTop: 8 }}>
                                <button onClick={(e) => { e.stopPropagation(); toggleShippers(p.name); }}
                                  style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", background: "transparent", border: "1px solid #0d1e38", borderRadius: 3, padding: "5px 8px", cursor: "pointer", fontFamily: "monospace" }}>
                                  <span style={{ fontSize: 11, color: "#4a7acc", letterSpacing: "0.1em", textTransform: "uppercase" }}>📞 Suggested Shippers ({p.shippers?.length || 0})</span>
                                  <span style={{ fontSize: 12, color: "#2a4a7a" }}>{shipperOpen ? "▲" : "▼"}</span>
                                </button>
                                {shipperOpen && <div style={{ marginTop: 6 }}>{p.shippers?.map(s => <ShipperCard key={s.name} s={s} />)}</div>}
                              </div>
                              <ShipperResearchPanel commodity={p} />
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </>
              )}

              {/* O/D PAIRS TAB */}
              {sidebarTab === "od" && (
                <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column" }}>
                  {/* Mode toggle */}
                  <div style={{ display: "flex", borderBottom: "1px solid #0f1828" }}>
                    <button onClick={() => { setOdMode("origin"); setTruckLocation(null); }}
                      style={{ flex: 1, padding: "8px", background: odMode === "origin" ? "#0a1828" : "transparent", color: odMode === "origin" ? "#55bbff" : "#2a4a7a", border: "none", borderBottom: odMode === "origin" ? "2px solid #3366aa" : "2px solid transparent", fontSize: 11, cursor: "pointer", fontFamily: "monospace", fontWeight: odMode === "origin" ? 700 : 400 }}>
                      📍 From Origin
                    </button>
                    <button onClick={() => { setOdMode("truck"); setOdOrigin(null); setOdDest(null); }}
                      style={{ flex: 1, padding: "8px", background: odMode === "truck" ? "#0a1828" : "transparent", color: odMode === "truck" ? "#ffaa44" : "#2a4a7a", border: "none", borderBottom: odMode === "truck" ? "2px solid #aa6600" : "2px solid transparent", fontSize: 11, cursor: "pointer", fontFamily: "monospace", fontWeight: odMode === "truck" ? 700 : 400 }}>
                      🚛 Truck at Dest
                    </button>
                  </div>

                  {/* Origin-first mode */}
                  {odMode === "origin" && (
                    <>
                      <div style={{ padding: "10px 12px", borderBottom: "1px solid #0f1828" }}>
                        <div style={{ fontSize: 11, letterSpacing: "0.2em", color: "#2a4a7a", textTransform: "uppercase", marginBottom: 8 }}>Step 1 · Select Origin</div>
                        <div style={{ fontSize: 12, color: "#1e3a70", marginBottom: 8, fontStyle: "italic" }}>Click a dot on the map or choose below</div>
                        <select value={odOrigin || ""} onChange={e => { setOdOrigin(e.target.value || null); setOdDest(null); }}
                          style={{ width: "100%", padding: "5px 8px", background: "#080c18", border: "1px solid #182840", borderRadius: 3, color: odOrigin ? "#55bbff" : "#2a4a7a", fontSize: 13, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }}>
                          <option value="">— All Origins —</option>
                          {odOriginList.map(o => <option key={o} value={o}>{o}</option>)}
                        </select>
                      </div>
                      {odOrigin && (
                        <div style={{ padding: "10px 12px", borderBottom: "1px solid #0f1828" }}>
                          <div style={{ fontSize: 11, letterSpacing: "0.2em", color: "#2a4a7a", textTransform: "uppercase", marginBottom: 8 }}>Step 2 · Select Destination</div>
                          <select value={odDest || ""} onChange={e => setOdDest(e.target.value || null)}
                            style={{ width: "100%", padding: "5px 8px", background: "#080c18", border: "1px solid #182840", borderRadius: 3, color: odDest ? "#00d4ff" : "#2a4a7a", fontSize: 13, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }}>
                            <option value="">— All Destinations ({odDestList.length}) —</option>
                            {odDestList.map(d => <option key={d} value={d}>{d}</option>)}
                          </select>
                        </div>
                      )}
                      <div style={{ padding: "10px 12px", flex: 1, overflowY: "auto" }}>
                        {!odOrigin && <div style={{ color: "#182e58", fontSize: 13, textAlign: "center", paddingTop: 30, lineHeight: 1.8 }}>Click an origin dot on the map<br/>to see its lanes and commodities.</div>}
                        {odOrigin && (
                          <>
                            <div style={{ marginBottom: 10 }}>
                              <div style={{ fontSize: 13, color: "#55bbff", fontWeight: 700, marginBottom: 3 }}>📍 {odOrigin}</div>
                              {odDest ? <div style={{ fontSize: 13, color: "#00d4ff", fontWeight: 700 }}>→ 🏙️ {odDest}</div>
                                : <div style={{ fontSize: 12, color: "#2a4a7a" }}>→ {odDestList.length} destinations · {odLaneCommodities.length} commodities</div>}
                            </div>
                            {odLaneCommodities.length === 0 && <div style={{ color: "#182e58", fontSize: 13, fontStyle: "italic" }}>No active commodities on this lane this month.</div>}
                            {odLaneCommodities.map(p => {
                              const shipperOpen = showShippers[`od-${p.name}`];
                              return (
                                <div key={p.name} style={{ padding: "8px 10px", marginBottom: 6, background: "#0a0e1a", border: "1px solid #0e1830", borderRadius: 4, borderLeft: `3px solid ${URGENCY_CONFIG[p.urgency]?.color || "#3a6acc"}` }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5, justifyContent: "space-between" }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                      <span style={{ fontSize: 14 }}>{p.emoji}</span>
                                      <div><div style={{ fontSize: 13, fontWeight: 700, color: "#90c8f0" }}>{p.name}</div><div style={{ fontSize: 11, color: "#1e3a70" }}>{p.category}</div></div>
                                    </div>
                                    <UrgencyBadge level={p.urgency} />
                                  </div>
                                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4, marginBottom: 5 }}>
                                    <div style={{ fontSize: 11, color: "#2a4a7a" }}>🌡️ {p.temp}</div>
                                    <div style={{ fontSize: 11, color: "#2a4a7a" }}>🚛 {p.equipment}</div>
                                  </div>
                                  <SeasonBar peakMonths={p.peakMonths} selectedMonth={selectedMonth} />
                                  <button onClick={() => toggleShippers(`od-${p.name}`)}
                                    style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", background: "transparent", border: "1px solid #0d1e38", borderRadius: 3, padding: "4px 7px", cursor: "pointer", fontFamily: "monospace", marginTop: 6 }}>
                                    <span style={{ fontSize: 10, color: "#3a5a8a", letterSpacing: "0.1em", textTransform: "uppercase" }}>📞 Shippers ({p.shippers?.length || 0})</span>
                                    <span style={{ fontSize: 11, color: "#2a4a7a" }}>{shipperOpen ? "▲" : "▼"}</span>
                                  </button>
                                  {shipperOpen && <div style={{ marginTop: 4 }}>{p.shippers?.map(s => <ShipperCard key={s.name} s={s} />)}</div>}
                                  <ShipperResearchPanel commodity={p} />
                                </div>
                              );
                            })}
                            {!odDest && odDestList.length > 0 && (
                              <div style={{ marginTop: 10 }}>
                                <div style={{ fontSize: 11, letterSpacing: "0.15em", textTransform: "uppercase", color: "#1e3a70", marginBottom: 6 }}>All Destinations</div>
                                {odDestList.map(d => {
                                  const cnt = activeProduce.filter(p => p.origins.includes(odOrigin) && p.destinations.includes(d)).length;
                                  return (
                                    <div key={d} onClick={() => setOdDest(d)}
                                      style={{ padding: "6px 10px", marginBottom: 3, background: "#080c18", border: "1px solid #0f1828", borderRadius: 3, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                      <span style={{ fontSize: 13, color: "#44ccff" }}>{d}</span>
                                      <span style={{ fontSize: 11, color: "#1a4890", fontFamily: "monospace" }}>{cnt} crop{cnt !== 1 ? "s" : ""}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </>
                        )}
                      </div>
                      {(odOrigin || odDest) && (
                        <div style={{ padding: "8px 12px", borderTop: "1px solid #0f1828" }}>
                          <button onClick={() => { setOdOrigin(null); setOdDest(null); }}
                            style={{ width: "100%", padding: "6px", background: "transparent", border: "1px solid #182e58", borderRadius: 3, color: "#2a4a7a", fontSize: 13, fontFamily: "monospace", cursor: "pointer", letterSpacing: "0.1em" }}>
                            ✕ CLEAR SELECTION
                          </button>
                        </div>
                      )}
                    </>
                  )}

                  {/* Truck-first (destination-first) mode */}
                  {odMode === "truck" && (
                    <>
                      <div style={{ padding: "10px 12px", borderBottom: "1px solid #0f1828" }}>
                        <div style={{ fontSize: 11, letterSpacing: "0.2em", color: "#aa6600", textTransform: "uppercase", marginBottom: 6 }}>🚛 Where is your truck?</div>
                        <div style={{ fontSize: 11, color: "#5a3a10", marginBottom: 8 }}>Find loads shipping INTO this city this month</div>
                        <select value={truckLocation || ""} onChange={e => setTruckLocation(e.target.value || null)}
                          style={{ width: "100%", padding: "5px 8px", background: "#080c18", border: "1px solid #3a2200", borderRadius: 3, color: truckLocation ? "#ffaa44" : "#5a3a10", fontSize: 13, fontFamily: "monospace", outline: "none", boxSizing: "border-box" }}>
                          <option value="">— Select city —</option>
                          {allDestList.map(d => <option key={d} value={d}>{d}</option>)}
                        </select>
                      </div>
                      <div style={{ padding: "10px 12px", flex: 1, overflowY: "auto" }}>
                        {!truckLocation && <div style={{ color: "#3a2200", fontSize: 13, textAlign: "center", paddingTop: 30, lineHeight: 1.8 }}>Select a destination city<br/>to see inbound loads.</div>}
                        {truckLocation && truckByOrigin.length === 0 && <div style={{ color: "#3a2200", fontSize: 13, fontStyle: "italic" }}>No active produce lanes into {truckLocation} this month.</div>}
                        {truckLocation && truckByOrigin.length > 0 && (
                          <>
                            <div style={{ marginBottom: 10 }}>
                              <div style={{ fontSize: 13, color: "#ffaa44", fontWeight: 700, marginBottom: 3 }}>🏙️ {truckLocation}</div>
                              <div style={{ fontSize: 12, color: "#7a5020" }}>{truckByOrigin.length} pickup origins · {truckLaneCommodities.length} commodities available</div>
                            </div>
                            {truckByOrigin.map(({ origin, commodities }) => {
                              const key = `truck-${origin}`;
                              const isOpen = showShippers[key];
                              return (
                                <div key={origin} style={{ marginBottom: 6, background: "#0a0e1a", border: "1px solid #2a1800", borderRadius: 4, overflow: "hidden" }}>
                                  <div onClick={() => toggleShippers(key)}
                                    style={{ padding: "8px 10px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", borderLeft: "3px solid #aa6600" }}>
                                    <div>
                                      <div style={{ fontSize: 13, fontWeight: 700, color: "#c08040" }}>📍 {origin}</div>
                                      <div style={{ fontSize: 11, color: "#5a3a10", marginTop: 2 }}>
                                        {commodities.map(c => c.emoji + " " + c.name).join(" · ")}
                                      </div>
                                    </div>
                                    <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                                      <span style={{ fontSize: 10, color: "#7a5020", fontFamily: "monospace" }}>{commodities.length} crop{commodities.length !== 1 ? "s" : ""}</span>
                                      <span style={{ fontSize: 11, color: "#3a2800" }}>{isOpen ? "▲" : "▼"}</span>
                                    </div>
                                  </div>
                                  {isOpen && (
                                    <div style={{ padding: "8px 10px", borderTop: "1px solid #1a0e00" }}>
                                      {commodities.map(p => {
                                        const shipperOpen = showShippers[`truckc-${origin}-${p.name}`];
                                        return (
                                          <div key={p.name} style={{ marginBottom: 8, paddingBottom: 8, borderBottom: "1px solid #0d0900" }}>
                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                                              <span style={{ fontSize: 13, color: "#90c8f0", fontWeight: 700 }}>{p.emoji} {p.name}</span>
                                              <UrgencyBadge level={p.urgency} />
                                            </div>
                                            <div style={{ fontSize: 11, color: "#2a4a7a", marginBottom: 4 }}>🌡️ {p.temp} · {p.equipment}</div>
                                            {p.carrierReqs && p.carrierReqs.length > 0 && (
                                              <div style={{ fontSize: 11, color: "#3a5a8a", marginBottom: 4, fontStyle: "italic" }}>{p.carrierReqs[0]}</div>
                                            )}
                                            <button onClick={() => toggleShippers(`truckc-${origin}-${p.name}`)}
                                              style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", background: "transparent", border: "1px solid #0d1e38", borderRadius: 3, padding: "4px 7px", cursor: "pointer", fontFamily: "monospace" }}>
                                              <span style={{ fontSize: 10, color: "#3a5a8a", textTransform: "uppercase", letterSpacing: "0.1em" }}>📞 Shippers ({p.shippers?.length || 0})</span>
                                              <span style={{ fontSize: 11, color: "#2a4a7a" }}>{shipperOpen ? "▲" : "▼"}</span>
                                            </button>
                                            {shipperOpen && <div style={{ marginTop: 4 }}>{p.shippers?.filter(s => s.location.includes(origin.split(",")[1]?.trim() || "") || origin.split(",")[0].split(" ").some(w => s.location.includes(w))).concat(p.shippers).slice(0,2).map(s => <ShipperCard key={s.name} s={s} />)}</div>}
                                            <ShipperResearchPanel commodity={p} />
                                          </div>
                                        );
                                      })}
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </>
                        )}
                      </div>
                      {truckLocation && (
                        <div style={{ padding: "8px 12px", borderTop: "1px solid #0f1828" }}>
                          <button onClick={() => setTruckLocation(null)}
                            style={{ width: "100%", padding: "6px", background: "transparent", border: "1px solid #3a2200", borderRadius: 3, color: "#5a3a10", fontSize: 13, fontFamily: "monospace", cursor: "pointer", letterSpacing: "0.1em" }}>
                            ✕ CLEAR TRUCK LOCATION
                          </button>
                        </div>
                      )}
                    </>
                  )}
                </div>
              )}

              {/* UPCOMING TAB */}
              {sidebarTab === "upcoming" && <UpcomingTab selectedMonth={selectedMonth} />}
            </div>
          </div>

          {/* Legend */}
          <div style={{ padding: "7px 20px", borderTop: "1px solid #0f1828", display: "flex", gap: 14, alignItems: "center", fontSize: 11, color: "#2a4a7a", letterSpacing: "0.1em", flexWrap: "wrap" }}>
            <span style={{ textTransform: "uppercase" }}>Origin Heat:</span>
            {[["#0055ff","1"],["#0088ff","2"],["#00aaff","3–4"],["#88ddff","5–6"],["#ffffff","7+"]].map(([color, label]) => (
              <span key={label} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ width: 10, height: 10, borderRadius: "50%", background: color, display: "inline-block", boxShadow: `0 0 5px ${color}` }}></span>{label} crop{label !== "1" ? "s" : ""}
              </span>
            ))}
            <span style={{ marginLeft: "auto", color: "#182e58" }}>Resolve Logistics Internal · {PRODUCE.length} commodities · 📞 click commodity for shippers</span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ProduceHeatMap />);
  </script>
</body>
</html>
